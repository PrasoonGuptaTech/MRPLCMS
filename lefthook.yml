pre-push:
  parallel: false
  jobs:
    - name: Push Testing
      run: echo "Push Testing...."

pre-commit:
  parallel: false
  jobs:
    - name: Commit Testing
      run: echo "Commit Testing...."

    - name: Formatting Files
      run: |
        npx prettier -- write {staged_files}
        git add {staged_files}

    - name: Check Merge Conflicts
      run: |
        if git diff --check; then
          exit 0
        else
          echo "Merge Conflicts detected"
          exit 1
        fi

    - name: prettier
      run: npx prettier --check "{staged_files}"
      glob: '*.{js,ts,jsx,tsx,css,scss,md}'

    - name: eslint
      run: npx eslint "{staged_files}"
      glob: '*.{js,ts,tsx,jsx}'

    - name: typecheck
      run: npx tsc --noEmit
      glob: '*.{ts,tsx}'

commit-msg:
  jobs:
    - name: Validate Commit message
      run: node scripts/validateCommitMessage.js {1}

    - name: commit message
      run: npx commitlint --edit {1}
